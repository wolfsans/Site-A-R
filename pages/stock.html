<section class="page page-stock" id="estoque" data-page="estoque">
  <section class="page-hero stock-hero">
    <div>
      <span class="eyebrow light">Estoque</span>
      <h1>Escolha seu proximo veiculo</h1>
      <p>Use os filtros para encontrar carros por marca, ano, cambio, preco e quilometragem.</p>
    </div>
  </section>

  <section class="inventory-layout reveal">
    <aside class="filters" aria-label="Filtros de estoque">
      <div class="filter-title">
        <h2>Filtros</h2>
        <button class="text-button" type="button" id="clearFilters">Limpar</button>
      </div>
      <label>
        Marca
        <select id="filterBrand"></select>
      </label>
      <label>
        Modelo
        <input id="filterModel" type="search" placeholder="Ex: Corolla" />
      </label>
      <div class="split-fields">
        <label>
          Ano de
          <input id="filterYearMin" type="number" min="1990" max="2030" placeholder="2018" />
        </label>
        <label>
          ate
          <input id="filterYearMax" type="number" min="1990" max="2030" placeholder="2026" />
        </label>
      </div>
      <div class="split-fields">
        <label>
          Preco de
          <input id="filterPriceMin" type="number" min="0" step="1000" placeholder="50000" />
        </label>
        <label>
          ate
          <input id="filterPriceMax" type="number" min="0" step="1000" placeholder="150000" />
        </label>
      </div>
      <label>
        Cambio
        <select id="filterTransmission">
          <option value="">Todos</option>
          <option value="Manual">Manual</option>
          <option value="Automatico">Automatico</option>
          <option value="Automático">Automático</option>
        </select>
      </label>
      <label>
        Combustivel
        <select id="filterFuel"></select>
      </label>
      <div class="split-fields">
        <label>
          Km de
          <input id="filterKmMin" type="number" min="0" step="1000" placeholder="0" />
        </label>
        <label>
          ate
          <input id="filterKmMax" type="number" min="0" step="1000" placeholder="90000" />
        </label>
      </div>
      <button class="button button-dark filter-search" type="button" id="searchFilters">
        <i data-lucide="search"></i>
        Pesquisar
      </button>
    </aside>

    <div class="inventory-content">
      <div class="inventory-toolbar">
        <div>
          <span id="vehicleCount">0 veiculos</span>
          <small>Estoque atualizado</small>
        </div>
        <label class="sort-control">
          <span>Ordenar por:</span>
          <select id="sortVehicles">
            <option value="relevance">Mais relevantes</option>
            <option value="price-desc">Maior preço</option>
            <option value="price-asc">Menor preço</option>
            <option value="year-desc">Ano mais novo</option>
            <option value="km-asc">Menor Km</option>
          </select>
        </label>
        <div class="inventory-admin-actions">
          <a class="button button-dark" href="#admin" id="stockAdminButton" hidden>
            <i data-lucide="plus"></i>
            Adicionar veiculo
          </a>
          <button class="button button-outline" type="button" id="stockLogoutButton" hidden>
            <i data-lucide="log-out"></i>
            Sair
          </button>
        </div>
      </div>
      <div class="vehicle-grid" id="vehicleGrid"></div>
      <div class="pagination" id="pagination"></div>
    </div>
  </section>
</section>
